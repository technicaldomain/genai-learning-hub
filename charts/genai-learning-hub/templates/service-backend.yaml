apiVersion: v1
kind: Service
metadata:
  name: {{ include "common.fullname" . }}-backend
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "common.labels.selector" . | nindent 4 }}
    app.kubernetes.io/component: backend
