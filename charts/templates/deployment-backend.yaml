apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "common.fullname" . }}-backend
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ default 1 .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "common.labels.selector" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "common.labels.standard" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        {{- include "common.annotations.deployment" . | nindent 8 }}
    spec:
      {{- include "common.affinity" . | nindent 6 }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- include "common.security.context" . | nindent 6 }}
      serviceAccountName: {{ template "common.serviceAccountName" . }}
      {{- $b := default (dict) .Values.backend }}
      {{- $cd := default (dict) ($b.config | default (dict)).data }}
      {{- $secrets := default (dict) ($b.secrets | default (dict)) }}
      {{- $maf := default (dict) ($secrets.mountAsFiles | default (dict)) }}
      {{- $hc := default (dict) ($b.healthCheck | default (dict)) }}
      {{- $hcl := default (dict) ($hc.liveness | default (dict)) }}
      {{- $hcr := default (dict) ($hc.readiness | default (dict)) }}
      {{- $res := default (dict) ($b.resources | default (dict)) }}
      {{- $rr := default (dict) ($res.requests | default (dict)) }}
      {{- $rl := default (dict) ($res.limits | default (dict)) }}
      containers:
        - name: app
          ports:
            - name: http
              containerPort: {{ int (default "8000" $cd.BACKEND_PORT) }}
              protocol: TCP
          image: "{{ default "ghcr.io" .Values.image.registry }}/{{ $b.image.repository }}:{{ default .Chart.AppVersion $b.image.tag }}"
          imagePullPolicy: {{ default "IfNotPresent" .Values.image.pullPolicy }}
          livenessProbe:
            httpGet:
              path: {{ default "/api/health" $hcl.path }}
              port: 8000
            initialDelaySeconds: {{ default 15 $hcl.initialDelaySeconds }}
            timeoutSeconds: {{ default 3 $hcl.timeoutSeconds }}
            periodSeconds: {{ default 20 $hcl.periodSeconds }}
            failureThreshold: {{ default 3 $hcl.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ default "/api/health" $hcr.path }}
              port: 8000
            initialDelaySeconds: {{ default 5 $hcr.initialDelaySeconds }}
            timeoutSeconds: {{ default 3 $hcr.timeoutSeconds }}
            periodSeconds: {{ default 10 $hcr.periodSeconds }}
            failureThreshold: {{ default 3 $hcr.failureThreshold }}
          {{- if $maf.enabled }}
          env:
            - name: CONFIG_K8S_SECRETS_ENABLED
              value: "true"
            - name: CONFIG_K8S_SECRETS_PATH
              value: {{ $maf.path | default "/var/run/secrets/genai-learning-hub" | quote }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "common.fullname" . }}-backend-config
            {{- if and $secrets.externalSecretName (not $maf.enabled) }}
            - secretRef:
                name: {{ $secrets.externalSecretName }}
            {{- end }}
            {{- range default (list) .Values.sharedConfigs }}
            - configMapRef:
                name: {{ . }}
            {{- end }}
            {{- range default (list) .Values.sharedSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          resources:
            requests:
              memory: {{ default "256Mi" $rr.memory }}
              cpu: {{ default "100m" $rr.cpu }}
            limits:
              memory: {{ default "512Mi" $rl.memory }}
              cpu: {{ default "500m" $rl.cpu }}
          {{- if and $secrets.externalSecretName $maf.enabled }}
          volumeMounts:
            - name: secret-volume
              mountPath: {{ $maf.path | default "/var/run/secrets/genai-learning-hub" }}
              readOnly: true
      volumes:
        - name: secret-volume
          secret:
            secretName: {{ $secrets.externalSecretName }}
          {{- end }}
