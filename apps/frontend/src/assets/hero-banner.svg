<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 400" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1440" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#0A3675"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="200" y1="200" x2="1200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00BFA5"/>
      <stop offset="100%" stop-color="#4DD0C0"/>
    </linearGradient>
  </defs>

  <!-- Subtle geometric background pattern -->
  <rect width="1440" height="400" fill="url(#bgGrad)"/>

  <!-- Abstract network nodes — representing collaboration and knowledge sharing -->
  <!-- Node 1: Top left -->
  <circle cx="200" cy="100" r="8" fill="#00BFA5" opacity="0.6"/>
  <circle cx="200" cy="100" r="16" fill="#00BFA5" opacity="0.2"/>
  <!-- Node 2: Top center -->
  <circle cx="500" cy="80" r="10" fill="#4DD0C0" opacity="0.5"/>
  <circle cx="500" cy="80" r="20" fill="#4DD0C0" opacity="0.15"/>
  <!-- Node 3: Center -->
  <circle cx="720" cy="200" r="12" fill="#00BFA5" opacity="0.7"/>
  <circle cx="720" cy="200" r="24" fill="#00BFA5" opacity="0.2"/>
  <!-- Node 4: Top right -->
  <circle cx="1000" cy="90" r="9" fill="#4DD0C0" opacity="0.5"/>
  <circle cx="1000" cy="90" r="18" fill="#4DD0C0" opacity="0.15"/>
  <!-- Node 5: Bottom right -->
  <circle cx="1200" cy="120" r="7" fill="#00BFA5" opacity="0.6"/>
  <circle cx="1200" cy="120" r="14" fill="#00BFA5" opacity="0.2"/>
  <!-- Node 6: Bottom left -->
  <circle cx="300" cy="300" r="6" fill="#4DD0C0" opacity="0.4"/>
  <circle cx="300" cy="300" r="12" fill="#4DD0C0" opacity="0.1"/>

  <!-- Connection lines — representing knowledge transfer -->
  <line x1="200" y1="100" x2="500" y2="80" stroke="#4DD0C0" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="100" x2="720" y2="200" stroke="#00BFA5" stroke-width="1" opacity="0.25"/>
  <line x1="500" y1="80" x2="720" y2="200" stroke="#00BFA5" stroke-width="1" opacity="0.3"/>
  <line x1="720" y1="200" x2="1000" y2="90" stroke="#4DD0C0" stroke-width="1" opacity="0.25"/>
  <line x1="720" y1="200" x2="1200" y2="120" stroke="#00BFA5" stroke-width="1" opacity="0.2"/>
  <line x1="500" y1="80" x2="1000" y2="90" stroke="#4DD0C0" stroke-width="0.5" opacity="0.2"/>
  <line x1="720" y1="200" x2="300" y2="300" stroke="#00BFA5" stroke-width="0.5" opacity="0.15"/>
  <line x1="1000" y1="90" x2="1200" y2="120" stroke="#4DD0C0" stroke-width="0.5" opacity="0.2"/>

  <!-- Abstract knowledge/learning symbols — clean geometric shapes -->
  <!-- Book/open book shape (learning) — bottom center -->
  <g transform="translate(560, 280)">
    <path d="M0 30 L60 10 L60 50 L0 70 Z" fill="#4DD0C0" stroke="#4DD0C0" stroke-width="1" opacity="0.4"/>
    <path d="M60 10 L120 30 L120 70 L60 50 Z" fill="#4DD0C0" stroke="#4DD0C0" stroke-width="1" opacity="0.4"/>
    <line x1="60" y1="10" x2="60" y2="50" stroke="#4DD0C0" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Puzzle piece motif (collaboration) — top right area -->
  <g transform="translate(1050, 200)" opacity="0.35">
    <path d="M20 0 L35 0 L35 10 L45 10 L45 25 L35 25 L35 35 L20 35 L20 25 L10 25 L10 10 L20 10 Z" fill="none" stroke="#4DD0C0" stroke-width="1.5"/>
  </g>

  <!-- Abstract brain/idea circles — top right -->
  <g transform="translate(1100, 60)" opacity="0.3">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#00BFA5" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="#00BFA5" opacity="0.3"/>
  </g>

  <!-- Decorative subtle dots -->
  <circle cx="100" cy="200" r="2" fill="#4DD0C0" opacity="0.2"/>
  <circle cx="150" cy="250" r="1.5" fill="#00BFA5" opacity="0.15"/>
  <circle cx="1300" cy="250" r="2" fill="#4DD0C0" opacity="0.2"/>
  <circle cx="400" cy="150" r="1.5" fill="#00BFA5" opacity="0.15"/>
  <circle cx="850" cy="100" r="2" fill="#4DD0C0" opacity="0.15"/>

  <!-- Clean horizontal accent line -->
  <line x1="620" y1="340" x2="820" y2="340" stroke="#00BFA5" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

  <!-- Subtle wave at bottom -->
  <path d="M0 380 Q180 360 360 375 Q540 390 720 370 Q900 350 1080 375 Q1260 395 1440 370 L1440 400 L0 400 Z" fill="#00BFA5" opacity="0.08"/>
</svg>
