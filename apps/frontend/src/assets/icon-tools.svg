    <!-- Outer nodes -->
    <circle cx="-20" cy="-15" r="4" fill="#5C6BC0" stroke="#283593" stroke-width="1"/>
    <circle cx="20" cy="-15" r="4" fill="#5C6BC0" stroke="#283593" stroke-width="1"/>
    <circle cx="-20" cy="15" r="4" fill="#5C6BC0" stroke="#283593" stroke-width="1"/>
    <circle cx="20" cy="15" r="4" fill="#5C6BC0" stroke="#283593" stroke-width="1"/>

    <!-- Connection lines -->
    <line x1="0" y1="0" x2="-15" y2="-11" stroke="#5C6BC0" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="15" y2="-11" stroke="#5C6BC0" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-15" y2="11" stroke="#5C6BC0" stroke-width="1.5"/>
