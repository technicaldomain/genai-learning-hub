<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="38" fill="#E8EAF6" stroke="#283593" stroke-width="1.5"/>

  <!-- Circuit/connector nodes representing integrations and APIs -->
