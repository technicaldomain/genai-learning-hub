<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <circle cx="40" cy="40" r="38" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>

  <!-- Newspaper/megaphone representing news and updates -->
  <g transform="translate(40, 40)">
    <!-- Document shape -->
    <rect x="-18" y="-20" width="36" height="40" rx="2" fill="#2E7D32" opacity="0.15" stroke="#2E7D32" stroke-width="1.5"/>
    <!-- Header bar -->
    <rect x="-14" y="-16" width="28" height="8" rx="1" fill="#2E7D32" opacity="0.3"/>
    <!-- Content lines -->
    <rect x="-12" y="-4" width="24" height="2" rx="1" fill="#2E7D32" opacity="0.3"/>
    <rect x="-12" y="0" width="20" height="2" rx="1" fill="#2E7D32" opacity="0.3"/>
    <rect x="-12" y="4" width="22" height="2" rx="1" fill="#2E7D32" opacity="0.3"/>
    <rect x="-12" y="8" width="16" height="2" rx="1" fill="#2E7D32" opacity="0.3"/>
    <rect x="-12" y="12" width="18" height="2" rx="1" fill="#2E7D32" opacity="0.3"/>
  </g>

  <!-- Bell notification -->
  <circle cx="58" cy="22" r="8" fill="#00BFA5" opacity="0.8"/>
  <path d="M55 22 L61 22 M58 19 L58 25" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
</svg>
