name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.semantic-release.outputs.release_version }}
      released: ${{ steps.semantic-release.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Semantic Release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release 2>&1 | tee /tmp/semantic-release.log
          RELEASE_VERSION=$(cat /tmp/semantic-release.log | grep "RELEASE_VERSION=" | sed 's/.*RELEASE_VERSION=\(.*\)/\1/')
          RELEASED="false"
          if [ -n "$RELEASE_VERSION" ]; then
            RELEASED="true"
          fi
          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "released=$RELEASED" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build and Push Docker Images
    needs: semantic-release
    if: ${{ needs.semantic-release.outputs.released == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            dockerfile: docker/frontend.Dockerfile
            context: .
            image: ghcr.io/${{ github.repository_owner }}/genai-learning-hub-frontend
          - name: backend
            dockerfile: docker/backend.Dockerfile
            context: .
            image: ghcr.io/${{ github.repository_owner }}/genai-learning-hub-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ needs.semantic-release.outputs.release_version }}" ]; then
            echo "version=${{ needs.semantic-release.outputs.release_version }}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign ${{ matrix.name }} image
        uses: sigstore/cosign-installer@v4
        with:
          cosign-release: "v2.4.0"
      - name: Sign images with GitHub OIDC
        run: |
          cosign sign --yes ${{ matrix.image }}:${{ steps.version.outputs.version }}
          cosign sign --yes ${{ matrix.image }}:latest
