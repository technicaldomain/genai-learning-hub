name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.semver.outputs.new_release_version }}
      published: ${{ steps.semver.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Semantic Release
        id: semver
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    name: Build and Push Docker Images
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            dockerfile: docker/frontend.Dockerfile
            context: .
            image: ghcr.io/${{ github.repository_owner }}/genai-learning-hub-frontend
          - name: backend
            dockerfile: docker/backend.Dockerfile
            context: .
            image: ghcr.io/${{ github.repository_owner }}/genai-learning-hub-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ needs.release.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-helm:
    name: Release Helm Chart
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Login to GHCR OCI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: |
          VERSION="${{ needs.release.outputs.tag }}"
          sed -i "s/^version:.*/version: ${VERSION}/" charts/genai-learning-hub/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/genai-learning-hub/Chart.yaml
          helm package charts/genai-learning-hub --version "${VERSION}" --app-version "${VERSION}"

      - name: Push chart
        run: |
          VERSION="${{ needs.release.outputs.tag }}"
          helm push genai-learning-hub-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
