name: Release Charts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  lint:
    name: Lint Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Helm dependency update
        working-directory: helm
        run: helm dependency update .

      - name: Run helm lint
        working-directory: helm
        run: helm lint .

  release:
    name: Release Charts
    needs: lint
    if: always() && !(needs lint.result == 'failure')
    runs-on: ubuntu-latest
    env:
      HELM_CHART_VERSION: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get local chart version
        id: version
        run: |
          VERSION=$(grep '^version:' helm/Chart.yaml | awk '{print $2}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Local chart version: $VERSION"

      - name: Check remote chart version
        id: remote
        run: |
          REMOTE_VERSION=""
          REMOTE_VERSION=$(helm show chart oci://ghcr.io/technicaldomain/helm/genai-learning-hub 2>/dev/null | grep '^version:' | awk '{print $2}' || echo "")
          echo "remote_version=$REMOTE_VERSION" >> $GITHUB_OUTPUT
          if [ -z "$REMOTE_VERSION" ]; then
            echo "Remote chart not found (first release)"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "Remote chart version: $REMOTE_VERSION"
            # Compare versions: release if local > remote
            if [ "$(printf '%s\n' "$REMOTE_VERSION" "${{ steps.version.outputs.version }}" | sort -V | head -n1)" != "${{ steps.version.outputs.version }}" ]; then
              echo "Local version is newer, releasing"
              echo "should_release=true" >> $GITHUB_OUTPUT
            else
              echo "Local version is not newer, skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Helm dependency update
        working-directory: helm
        run: helm dependency update .

      - name: Package chart
        working-directory: helm
        run: helm package . --destination /tmp/release-packages/

      - name: Push chart to OCI
        working-directory: /tmp/release-packages
        run: |
          helm push genai-learning-hub-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/technicaldomain/helm

      - name: Sign chart with cosign
        uses: sigstore/cosign-installer@v4
        with:
          cosign-release: "v2.4.0"

      - name: Sign chart with GitHub OIDC
        run: |
          cosign sign --yes ghcr.io/technicaldomain/helm/genai-learning-hub:${{ steps.version.outputs.version }}
